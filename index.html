<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>卡券領取教學 Claim Voucher Guide</title>
  <link rel="icon" href="./icon_result (1).ico" type="image/x-icon">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; }
    img { width: 100%; display: block; }
    #top-btn {
      display: block;
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: rgba(255,255,255,0.15);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 50%;
      width: 48px;
      height: 48px;
      font-size: 22px;
      cursor: pointer;
      z-index: 99;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <img src="./claim-voucher-guide.jpg" alt="Claim Voucher Guide">
  <button id="top-btn" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>
  <script>
    window.addEventListener('scroll', function() {
      let btn = document.getElementById('top-btn');
      let nearBottom = window.innerHeight + window.scrollY >= document.body.scrollHeight - 80;
      btn.style.opacity = nearBottom ? '1' : '0';
      btn.style.pointerEvents = nearBottom ? 'auto' : 'none';
    });
  </script>
</body>
</html>
