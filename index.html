<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>卡券領取教學 Claim Voucher Guide</title>
  <link rel="icon" href="./icon_result (1).ico" type="image/x-icon">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; height: 100dvh; }

    #tab-bar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      display: flex;
      z-index: 100;
      height: 48px;
      background: #000;
      border-bottom: 1px solid rgba(255,255,255,0.15);
    }
    .tab {
      flex: 1;
      background: transparent;
      color: rgba(255,255,255,0.4);
      border: none;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: color 0.2s;
      letter-spacing: 0.03em;
      position: relative;
      z-index: 1;
    }
    .tab.active { color: #fff; font-weight: 700; }

    /* sliding pill background */
    #tab-pill {
      position: absolute;
      top: 0;
      left: 0;
      width: 50%;
      height: 100%;
      background: rgba(255,255,255,0.22);
      border-radius: 8px 8px 0 0;
      pointer-events: none;
      will-change: transform;
    }

    /* sliding indicator bar */
    #tab-indicator {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 50%;           /* one tab's width */
      height: 2px;
      background: #fd6f15;
      will-change: transform;
      /* transition applied by JS */
    }

    #slider-wrap {
      margin-top: 48px;
      height: calc(100dvh - 48px);
      overflow: hidden;
    }
    #slider {
      display: flex;
      width: 200%;
      height: 100%;
      will-change: transform;
      /* transition applied by JS */
    }
    .slide {
      width: 50%;
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }
    .slide img {
      width: 100%;
      display: block;
    }

    #top-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: rgba(255,255,255,0.15);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 50%;
      width: 48px;
      height: 48px;
      font-size: 22px;
      cursor: pointer;
      z-index: 99;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="tab-bar">
    <div id="tab-pill"></div>
    <button class="tab active" data-index="0">領取教學</button>
    <button class="tab" data-index="1">使用教學</button>
    <div id="tab-indicator"></div>
  </div>

  <div id="slider-wrap">
    <div id="slider">
      <div class="slide" id="slide-0"><img src="./pick.jpg" alt="領取教學" decoding="async"></div>
      <div class="slide" id="slide-1"><img src="./use.jpg" alt="使用教學" loading="lazy" decoding="async"></div>
    </div>
  </div>

  <button id="top-btn" onclick="scrollCurrentToTop()">↑</button>

  <script>
    let currentIndex = 0;
    const slider      = document.getElementById('slider');
    const indicator   = document.getElementById('tab-indicator');
    const pill        = document.getElementById('tab-pill');
    const tabs        = document.querySelectorAll('.tab');
    const slides      = document.querySelectorAll('.slide');
    const topBtn      = document.getElementById('top-btn');
    const sliderWrap  = document.getElementById('slider-wrap');

    const EASE = 'transform 0.35s ease';

    // p = 0 → page 0, p = 1 → page 1
    function setProgress(p, animated) {
      slider.style.transition    = animated ? EASE : 'none';
      indicator.style.transition = animated ? EASE : 'none';
      pill.style.transition      = animated ? EASE : 'none';
      // slider is 200vw wide; page 1 needs -50% of that = -100vw
      slider.style.transform    = `translateX(${p * -50}%)`;
      // indicator is 50vw wide; needs to travel one full tab width (100% of itself)
      indicator.style.transform = `translateX(${p * 100}%)`;
      // pill moves one tab width (50vw) in pixels
      pill.style.transform      = `translateX(${p * 100}%)`;
    }

    function goTo(index, animated = true) {
      currentIndex = index;
      setProgress(index, animated);
      tabs.forEach((t, i) => t.classList.toggle('active', i === index));
      updateTopBtn();
    }

    tabs.forEach(tab => {
      tab.addEventListener('click', () => goTo(parseInt(tab.dataset.index)));
    });

    // ── Drag-follow swipe ──────────────────────────────────────────────────
    let startX = 0, startY = 0, startTime = 0;
    let direction = null; // 'h' | 'v' | null

    sliderWrap.addEventListener('touchstart', e => {
      startX    = e.touches[0].clientX;
      startY    = e.touches[0].clientY;
      startTime = Date.now();
      direction = null;
      // kill transitions so movement is immediate
      slider.style.transition    = 'none';
      indicator.style.transition = 'none';
      pill.style.transition      = 'none';
    }, { passive: true });

    sliderWrap.addEventListener('touchmove', e => {
      const dx = e.touches[0].clientX - startX;
      const dy = e.touches[0].clientY - startY;

      if (direction === null && (Math.abs(dx) > 4 || Math.abs(dy) > 4)) {
        direction = Math.abs(dx) >= Math.abs(dy) ? 'h' : 'v';
      }
      if (direction !== 'h') return;

      e.preventDefault();

      // progress: how far between the two pages (0–1)
      const rawP = currentIndex - dx / window.innerWidth;
      const p    = Math.max(0, Math.min(1, rawP));
      setProgress(p, false);
    }, { passive: false });

    sliderWrap.addEventListener('touchend', e => {
      if (direction !== 'h') return;

      const dx       = e.changedTouches[0].clientX - startX;
      const velocity = Math.abs(dx) / (Date.now() - startTime);
      const enough   = Math.abs(dx) > window.innerWidth * 0.25 || velocity > 0.3;

      if (enough && dx < 0 && currentIndex === 0) goTo(1);
      else if (enough && dx > 0 && currentIndex === 1) goTo(0);
      else goTo(currentIndex); // snap back
    }, { passive: true });

    // ── Back to top ────────────────────────────────────────────────────────
    function currentSlide() { return slides[currentIndex]; }

    function updateTopBtn() {
      const slide    = currentSlide();
      const nearBottom = slide.scrollTop + slide.clientHeight >= slide.scrollHeight - 80;
      topBtn.style.opacity       = nearBottom ? '1' : '0';
      topBtn.style.pointerEvents = nearBottom ? 'auto' : 'none';
    }

    function scrollCurrentToTop() {
      currentSlide().scrollTo({ top: 0, behavior: 'smooth' });
    }

    slides.forEach(slide => {
      slide.addEventListener('scroll', updateTopBtn, { passive: true });
    });
  </script>
</body>
</html>
